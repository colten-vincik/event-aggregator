<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Event Aggregator</title>
<style>
  :root {
    --blue:  #1F3864;
    --green: #375623;
    --accent:#2E75B6;
    --bg:    #f4f6f9;
    --card:  #ffffff;
    --border:#dde1e7;
    --text:  #1a1a2e;
    --muted: #6c757d;
    --red:   #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

  header {
    background: var(--blue); color: #fff;
    padding: 18px 32px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header p  { font-size: 13px; opacity: .75; margin-top: 2px; }

  main { max-width: 820px; margin: 36px auto; padding: 0 20px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 28px 32px; margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
  }
  .card h2 { font-size: 16px; color: var(--blue); margin-bottom: 18px;
             border-bottom: 2px solid var(--border); padding-bottom: 10px; }

  /* Mode tabs */
  .mode-tabs { display: flex; gap: 0; margin-bottom: 20px;
               border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .mode-tab  { flex: 1; padding: 9px 0; text-align: center; font-size: 13px;
               font-weight: 600; cursor: pointer; background: #f8f9fa;
               border: none; color: var(--muted); transition: all .15s; }
  .mode-tab.active { background: var(--blue); color: #fff; }

  /* Input areas */
  .input-panel { display: none; }
  .input-panel.visible { display: block; }

  label { font-size: 13px; font-weight: 600; color: var(--muted);
          display: block; margin-bottom: 6px; }
  select, input[type=text] {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; color: var(--text);
    background: #fff; appearance: none; outline: none;
    transition: border-color .15s;
  }
  select:focus, input[type=text]:focus { border-color: var(--accent); }

  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-weight: 400; color: var(--text); }

  /* Run button */
  #run-btn {
    display: block; width: 100%; margin-top: 22px;
    padding: 13px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background .15s, transform .1s;
  }
  #run-btn:hover:not(:disabled) { background: var(--blue); }
  #run-btn:active:not(:disabled) { transform: scale(.98); }
  #run-btn:disabled { opacity: .55; cursor: not-allowed; }

  /* Progress panel */
  #progress-panel { display: none; }
  #progress-log {
    background: #0d1117; color: #c9d1d9; font-family: 'Consolas','Courier New',monospace;
    font-size: 12px; line-height: 1.6; padding: 16px; border-radius: 6px;
    height: 280px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }
  .progress-bar-wrap { background: var(--border); border-radius: 4px;
                        height: 6px; margin: 14px 0 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); width: 0%;
                  transition: width .4s; border-radius: 4px; }
  #progress-label { font-size: 12px; color: var(--muted); text-align: right; }

  /* Results panel */
  #results-panel { display: none; }
  .result-stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 120px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 18px; text-align: center;
  }
  .stat-box .num { font-size: 28px; font-weight: 700; color: var(--blue); }
  .stat-box .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .dl-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
  .dl-btn {
    flex: 1; min-width: 160px; padding: 12px 16px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none;
    text-align: center; display: inline-block; transition: opacity .15s;
  }
  .dl-btn:hover { opacity: .85; }
  .dl-xlsx { background: #217346; color: #fff; }
  .dl-map  { background: var(--blue); color: #fff; }
  .dl-log  { background: #f0f0f0; color: var(--text); }

  /* Error */
  #error-panel { display: none; background: #fdf0ef; border: 1px solid #e8b4b0;
                  border-radius: 8px; padding: 16px 20px; color: var(--red); font-size: 13px; }

  footer { text-align: center; color: var(--muted); font-size: 12px;
            padding: 32px 0 24px; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🗺 US Event Aggregator</h1>
    <p>Search events, concerts, attractions &amp; things to do across 47 US cities</p>
  </div>
</header>

<main>

  <!-- ── Search form ──────────────────────────────────────────────────────── -->
  <div class="card" id="form-card">
    <h2>Find Events</h2>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="single"  onclick="setMode('single')">Single City</button>
      <button class="mode-tab"        data-mode="region"  onclick="setMode('region')">Region</button>
      <button class="mode-tab"        data-mode="multi"   onclick="setMode('multi')">Custom Cities</button>
    </div>

    <!-- Single city -->
    <div class="input-panel visible" id="panel-single">
      <label for="city-select">City</label>
      <select id="city-select">
        {% for city in cities %}
          <option value="{{ city.lower() }}">{{ city }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Region -->
    <div class="input-panel" id="panel-region">
      <label for="region-select">Region</label>
      <select id="region-select">
        {% for region in regions %}
          <option value="{{ region.lower() }}">{{ region }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Multi city -->
    <div class="input-panel" id="panel-multi">
      <label for="multi-input">Cities (semicolon-separated)</label>
      <input type="text" id="multi-input"
             placeholder="Boston, MA; Chicago, IL; Miami, FL">
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="skip-att">
      <label for="skip-att">Skip landmarks / attractions (faster)</label>
    </div>

    <button id="run-btn" onclick="startRun()">▶ Run</button>
  </div>

  <!-- ── Progress ────────────────────────────────────────────────────────── -->
  <div class="card" id="progress-panel">
    <h2>Running…</h2>
    <div class="progress-bar-wrap"><div class="progress-bar" id="pbar"></div></div>
    <div id="progress-label">Starting…</div>
    <div id="progress-log"></div>
  </div>

  <!-- ── Results ─────────────────────────────────────────────────────────── -->
  <div class="card" id="results-panel">
    <h2>✅ Done</h2>
    <div class="result-stats">
      <div class="stat-box"><div class="num" id="r-events">—</div><div class="lbl">Events</div></div>
      <div class="stat-box"><div class="num" id="r-att">—</div><div class="lbl">Attractions</div></div>
      <div class="stat-box"><div class="num" id="r-time">—</div><div class="lbl">Seconds</div></div>
    </div>
    <div class="dl-buttons">
      <a id="dl-xlsx" class="dl-btn dl-xlsx" href="#" download>📊 Download Excel</a>
      <a id="dl-map"  class="dl-btn dl-map"  href="#" target="_blank">🗺 Open Map</a>
      <a id="dl-log"  class="dl-btn dl-log"  href="#" download>📄 Run Report</a>
    </div>
  </div>

  <!-- ── Error ───────────────────────────────────────────────────────────── -->
  <div id="error-panel">
    ⚠ <span id="error-msg"></span>
    <br><br><a href="/" style="color:var(--red)">← Try again</a>
  </div>

</main>

<footer>
  <a href="https://github.com/colten-vincik/event-aggregator" target="_blank">GitHub</a>
  &nbsp;·&nbsp; Built with Python · Flask · Leaflet.js
</footer>

<script>
let currentMode = 'single';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === mode));
  document.querySelectorAll('.input-panel').forEach(p =>
    p.classList.toggle('visible', p.id === 'panel-' + mode));
}

function getValue() {
  if (currentMode === 'single') return document.getElementById('city-select').value;
  if (currentMode === 'region') return document.getElementById('region-select').value;
  return document.getElementById('multi-input').value.trim();
}

function show(id)  { document.getElementById(id).style.display = 'block'; }
function hide(id)  { document.getElementById(id).style.display = 'none';  }

async function startRun() {
  const value = getValue();
  if (!value) { alert('Please select a city or enter cities.'); return; }

  const skipAtt = document.getElementById('skip-att').checked ? '1' : '0';

  // Transition UI
  document.getElementById('run-btn').disabled = true;
  hide('error-panel');
  hide('results-panel');
  show('progress-panel');

  const log    = document.getElementById('progress-log');
  const pbar   = document.getElementById('pbar');
  const plabel = document.getElementById('progress-label');
  log.textContent = '';
  pbar.style.width = '5%';
  plabel.textContent = 'Starting scraper…';

  // Post to /run
  const fd = new FormData();
  fd.append('mode',             currentMode);
  fd.append('value',            value);
  fd.append('skip_attractions', skipAtt);

  let jobId;
  try {
    const res = await fetch('/run', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    jobId = data.job_id;
  } catch (e) {
    showError(e.message); return;
  }

  // Stream progress via SSE
  const evtSource = new EventSource('/stream/' + jobId);
  let lineCount = 0;

  evtSource.onmessage = function(e) {
    if (e.data === '__DONE__') {
      evtSource.close();
      pbar.style.width = '100%';
      plabel.textContent = 'Fetching results…';
      fetchResult(jobId);
      return;
    }
    if (!e.data.trim()) return;  // keepalive ping
    log.textContent += e.data + '\n';
    log.scrollTop = log.scrollHeight;
    lineCount++;
    // Rough progress estimate: ~120 meaningful log lines for a single city
    const pct = Math.min(5 + Math.round((lineCount / 120) * 90), 95);
    pbar.style.width = pct + '%';
    plabel.textContent = `Fetching data… (${lineCount} updates)`;
  };

  evtSource.onerror = function() {
    evtSource.close();
    fetchResult(jobId);  // may already be done
  };
}

async function fetchResult(jobId) {
  try {
    const res  = await fetch('/status/' + jobId);
    const data = await res.json();
    if (data.status === 'running') {
      // Still running — poll again in a second
      setTimeout(() => fetchResult(jobId), 1000);
      return;
    }
    if (data.status === 'error') {
      showError(data.error); return;
    }
    // Done
    hide('progress-panel');
    const r = data.result;
    document.getElementById('r-events').textContent = r.events.toLocaleString();
    document.getElementById('r-att').textContent    = r.attractions.toLocaleString();
    document.getElementById('r-time').textContent   = r.elapsed + 's';
    document.getElementById('dl-xlsx').href = '/download/' + jobId + '/xlsx';
    document.getElementById('dl-map').href  = '/download/' + jobId + '/map';
    document.getElementById('dl-log').href  = '/download/' + jobId + '/report';
    show('results-panel');
  } catch (e) {
    showError('Could not retrieve results: ' + e.message);
  }
}

function showError(msg) {
  hide('progress-panel');
  document.getElementById('run-btn').disabled = false;
  document.getElementById('error-msg').textContent = msg;
  show('error-panel');
}
</script>
</body>
</html>
